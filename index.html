<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f8fafc; font-family:sans-serif; }
.leak-card { background:white; border-radius:20px; padding:15px; margin-bottom:15px; }
.label { font-size:11px; color:#888; font-weight:bold; }
.value { font-size:14px; font-weight:600; word-break:break-all; }
</style>
</head>

<body>

<div class="p-4">
<input id="q" placeholder="Search..." class="border p-3 w-full rounded-xl">
<button onclick="go()" class="bg-blue-600 text-white p-3 w-full mt-2 rounded-xl">Search</button>
</div>

<div id="out" class="p-4"></div>

<script>
async function go() {
  const q = document.getElementById("q").value;
  const res = await fetch("/api/search?q=" + encodeURIComponent(q));
  let text = await res.text();

  try {
    const data = JSON.parse(text);
    render(data);
  } catch {
    document.getElementById("out").innerText = text;
  }
}

function render(arr) {
  const out = document.getElementById("out");
  out.innerHTML = "";

  let current = {};

  arr.forEach(line => {
    if (line.includes("Email:")) current.email = line.split("Email:")[1].trim();
    if (line.includes("Password:")) current.password = line.split("Password:")[1].trim();
    if (line.includes("Mobile:")) current.mobile = line.split("Mobile:")[1].trim();
    if (line.includes("Full name:")) current.name = line.split("Full name:")[1].trim();
    if (line.includes("Link:")) current.link = line.split("Link:")[1].trim();

    // jab email + password mil jaye to card bana do
    if (current.email && current.password) {
      createCard(current);
      current = {};
    }
  });
}

function createCard(data) {
  const out = document.getElementById("out");

  out.innerHTML += `
    <div class="leak-card">
      ${data.email ? `<div><div class="label">Email</div><div class="value">${data.email}</div></div>` : ""}
      ${data.password ? `<div><div class="label">Password</div><div class="value text-blue-600">${data.password}</div></div>` : ""}
      ${data.mobile ? `<div><div class="label">Mobile</div><div class="value">${data.mobile}</div></div>` : ""}
      ${data.name ? `<div><div class="label">Name</div><div class="value">${data.name}</div></div>` : ""}
      ${data.link ? `<div><div class="label">Site</div><div class="value">${data.link}</div></div>` : ""}
    </div>
  `;
}
</script>

</body>
</html>
