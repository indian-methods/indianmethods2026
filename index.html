<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OSINT Pro - @indian_methods</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#f8fafc; color:#1e293b; }
    .search-container { position:sticky; top:0; z-index:100; background:rgba(248,250,252,.95); backdrop-filter:blur(12px); border-bottom:1px solid #e2e8f0;}
    .leak-card { background:white; border-radius:24px; border:1px solid #e2e8f0; box-shadow:0 4px 12px rgba(0,0,0,.03); overflow:hidden; margin-bottom:20px;}
    .data-block { padding:16px 20px;}
    .data-item { margin-bottom:10px;}
    .data-label { font-size:10px; font-weight:800; color:#94a3b8;}
    .data-value { font-size:14px; font-weight:600; word-break:break-all;}
    .copy-btn { background:#f1f5f9; color:#64748b; border-radius:12px; padding:8px 16px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px; margin:0 20px 15px auto;}
    .loader { border-top-color:#3b82f6; animation:spin .8s linear infinite;}
    @keyframes spin { to { transform:rotate(360deg);} }
  </style>
</head>

<body class="pb-20">

<header class="px-6 pt-8 pb-4 flex justify-between items-center">
  <div>
    <h1 class="text-2xl font-extrabold text-blue-600 tracking-tight">OSINT Pro</h1>
    <a href="https://t.me/indian_methods" target="_blank" class="text-slate-500 text-xs font-medium flex items-center gap-1">
      Developed by <span class="text-blue-500 font-bold ml-1">@indian_methods</span>
    </a>
  </div>
</header>

<div class="search-container px-4 py-4 mb-4">
  <div class="relative flex items-center">
    <input id="searchInput" type="text" placeholder="Enter search text..."
      class="w-full bg-white border-2 border-slate-100 rounded-2xl px-5 py-4 pr-16 focus:outline-none focus:border-blue-500 shadow-sm text-base">
    <button onclick="handleSearch()" class="absolute right-2 bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center">
      <i class="fas fa-search text-lg"></i>
    </button>
  </div>
</div>

<div id="statusInfo" class="px-6 mb-4 hidden">
  <div class="flex justify-between items-center">
    <span id="resultCountText" class="text-[11px] font-bold bg-blue-600 text-white px-3 py-1 rounded-full">0 Records</span>
    <span id="queryDisplay" class="text-[11px] font-bold text-slate-400 truncate max-w-[150px]"></span>
  </div>
</div>

<main id="resultsList" class="px-4"></main>

<button id="loadMoreBtn" class="hidden mx-auto block mt-4 bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">
  Load More
</button>

<div id="loading" class="hidden fixed inset-0 bg-white/95 flex flex-col items-center justify-center z-[200]">
  <div class="loader rounded-full border-4 border-slate-100 h-12 w-12 mb-4"></div>
  <p class="font-bold text-slate-800">Searching...</p>
</div>

<script>
let globalData = [];
let renderIndex = 0;
const CHUNK = 50;

async function handleSearch() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("resultsList").innerHTML = "";
  document.getElementById("statusInfo").classList.add("hidden");
  document.getElementById("loadMoreBtn").classList.add("hidden");

  try {
    const res = await fetch("/api/search?q=" + encodeURIComponent(query));
    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      // 🔥 IMPORTANT FIX (large raw text support)
      data = text.split(/\r?\n/).filter(x => x.trim());
    }

    globalData = data;
    renderIndex = 0;

    document.getElementById("resultCountText").innerText = data.length + " Lines";
    document.getElementById("queryDisplay").innerText = query;
    document.getElementById("statusInfo").classList.remove("hidden");

    renderChunk();

  } catch {
    document.getElementById("resultsList").innerHTML = "<h3 class='text-center mt-10'>Error loading data</h3>";
  }

  document.getElementById("loading").classList.add("hidden");
}

function renderChunk() {
  const slice = globalData.slice(renderIndex, renderIndex + CHUNK);

  let current = {};
  let added = 0;

  slice.forEach(line => {
    if (line.includes("Email:")) current.email = line.split("Email:")[1].trim();
    if (line.includes("Password:")) current.password = line.split("Password:")[1].trim();
    if (line.includes("Mobile:")) current.mobile = line.split("Mobile:")[1].trim();
    if (line.includes("Full name:")) current.name = line.split("Full name:")[1].trim();
    if (line.includes("Address:")) current.address = line.split("Address:")[1].trim();
    if (line.includes("Link:")) current.link = line.split("Link:")[1].trim();

    // 🔥 FIX: strict condition hata diya
    if (Object.keys(current).length >= 2) {
      addCard(current);
      current = {};
      added++;
    }
  });

  renderIndex += CHUNK;

  if (renderIndex < globalData.length) {
    document.getElementById("loadMoreBtn").classList.remove("hidden");
  } else {
    document.getElementById("loadMoreBtn").classList.add("hidden");
  }

  if (renderIndex === CHUNK && added === 0) {
    document.getElementById("resultsList").innerHTML = "<h3 class='text-center mt-10'>No Structured Data Found</h3>";
  }
}

document.getElementById("loadMoreBtn").onclick = renderChunk;

function addCard(data) {
  const resultsList = document.getElementById("resultsList");

  const card = document.createElement("div");
  card.className = "leak-card";

  let html = `<div class="data-block">`;

  if (data.email) html += item("Email", data.email);
  if (data.password) html += item("Password", data.password, true);
  if (data.mobile) html += item("Mobile", data.mobile);
  if (data.name) html += item("Name", data.name);
  if (data.address) html += item("Address", data.address);
  if (data.link) html += item("Site", data.link);

  html += "</div>";

  card.innerHTML = html;
  resultsList.appendChild(card);
}

function item(label, value, blue=false) {
  return `<div class="data-item">
    <div class="data-label">${label}</div>
    <div class="data-value ${blue ? "text-blue-600":""}">${value}</div>
  </div>`;
}

document.getElementById("searchInput").addEventListener("keyup", e => {
  if (e.key === "Enter") handleSearch();
});
</script>

</body>
</html>
